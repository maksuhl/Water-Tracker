<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>H2O Analytics Tracker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-brown: #fb923c;
            --tab-inactive: #64748b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(80px + env(safe-area-inset-bottom)) 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { font-size: 26px; margin: 10px 0 20px 0; font-weight: 700; width: 100%; max-width: 400px; text-align: left; }
        
        /* Экраны (вкладки) */
        .screen { display: none; width: 100%; max-width: 400px; flex-direction: column; }
        .screen.active { display: flex; }

        /* Виджет Главной */
        .goal-container { background: var(--card-bg); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 15px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .counter { font-size: 44px; font-weight: 800; color: var(--accent-blue); margin: 5px 0; }
        .counter span { font-size: 18px; color: #64748b; font-weight: 400; }
        .progress-bar-bg { width: 100%; height: 12px; background: #0f172a; border-radius: 6px; overflow: hidden; margin-top: 15px; }
        .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #0284c7, var(--accent-blue)); transition: width 0.4s ease-out; }
        
        /* Сетки кнопок */
        .section-title { font-size: 12px; text-transform: uppercase; color: #64748b; letter-spacing: 1px; margin: 15px 0 8px 5px; font-weight: 600; align-self: flex-start; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 14px 5px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .btn:active { transform: scale(0.95); background: #334155; }
        .btn span { font-size: 11px; opacity: 0.6; font-weight: 400; }
        .btn-water { border-bottom: 3px solid var(--accent-blue); }
        .btn-coffee { border-bottom: 3px solid var(--accent-brown); }
        .btn-tea { border-bottom: 3px solid var(--accent-green); }
        
        /* Таббар внизу */
        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #111726;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
        }
        .tab-item {
            background: none; border: none; color: var(--tab-inactive);
            font-size: 11px; font-weight: 500; display: flex;
            flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 33%;
        }
        .tab-item .icon { font-size: 20px; }
        .tab-item.active { color: var(--accent-blue); }

        /* Элементы списков */
        .card-list { background: var(--card-bg); border-radius: 20px; padding: 15px; list-style: none; margin: 0; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .list-item:last-child { border: none; }
        
        /* Экран Цели */
        .input-group { display: flex; gap: 10px; width: 100%; margin-top: 10px; }
        .input-number {
            flex: 1; background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 15px; color: white; font-size: 18px;
            font-weight: 600; text-align: center; outline: none;
        }
        .save-btn {
            background: var(--accent-blue); color: #0b0f19; border: none;
            border-radius: 14px; padding: 0 25px; font-size: 15px; font-weight: 700; cursor: pointer;
        }
        .save-btn:active { opacity: 0.8; }
        
        .reset-day-btn {
            background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 14px; padding: 12px; font-size: 13px; font-weight: 600; cursor: pointer;
            margin-top: 20px; width: 100%; text-align: center;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ГЛAВНАЯ -->
    <div id="screen-home" class="screen active">
        <h1>Сегодня</h1>
        <div class="goal-container">
            <div class="counter" id="totalDisplay">0 <span>/ <span id="homeGoalDisplay">2000</span> мл</span></div>
            <div style="font-size: 12px; color: #64748b; margin-top: -2px;">чистая вода для организма</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
        </div>

        <div class="section-title">Чистая вода (100%)</div>
        <div class="grid">
            <button class="btn btn-water" onclick="addDrink('Вода', 200, 1.0)">💧 Вода <span>200 мл</span></button>
            <button class="btn btn-water" onclick="addDrink('Вода', 250, 1.0)">💧 Вода <span>250 мл</span></button>
            <button class="btn btn-water" onclick="addDrink('Вода', 300, 1.0)">💧 Вода <span>300 мл</span></button>
        </div>

        <div class="section-title">Кофе (50-60%)</div>
        <div class="grid">
            <button class="btn btn-coffee" onclick="addDrink('Эспрессо', 50, 0.5)">☕ Эспрессо <span>50 мл</span></button>
            <button class="btn btn-coffee" onclick="addDrink('Капучино м.', 250, 0.6)">🥛 Капуч. М <span>250 мл</span></button>
            <button class="btn btn-coffee" onclick="addDrink('Капучино б.', 350, 0.6)">🥤 Капуч. Б <span>350 мл</span></button>
        </div>

        <div class="section-title">Чай (75-85%)</div>
        <div class="grid">
            <button class="btn btn-tea" onclick="addDrink('Чай б/сах.', 350, 0.85)">🍃 Без сах. <span>350 мл</span></button>
            <button class="btn btn-tea" onclick="addDrink('Чай с сах.', 350, 0.75)">🍬 С сахаром <span>350 мл</span></button>
        </div>
        
        <div class="section-title" style="margin-top: 25px;">Лента за сегодня</div>
        <ul class="card-list" id="todayLogList" style="max-height: 180px; overflow-y: auto;"></ul>
    </div>

    <!-- ЭКРАН 2: АНАЛИТИКА -->
    <div id="screen-analytics" class="screen">
        <h1>Аналитика</h1>
        <div class="section-title">История по дням</div>
        <ul class="card-list" id="analyticsList">
            <!-- Сюда будут падать прошлые дни -->
        </ul>
    </div>

    <!-- ЭКРАН 3: ЦЕЛЬ -->
    <div id="screen-goal" class="screen">
        <h1>Настройки цели</h1>
        <div class="section-title">Дневная норма воды (мл)</div>
        <div class="input-group">
            <input type="number" id="goalInput" class="input-number" placeholder="2000" pattern="[0-9]*" inputmode="numeric">
            <button class="save-btn" onclick="saveNewGoal()">ОК</button>
        </div>
        
        <button class="reset-day-btn" onclick="confirmReset()">Сбросить текущий день</button>
    </div>

    <!-- ТАББАР (НИЖНЯЯ ПАНЕЛЬ) -->
    <div class="tab-bar">
        <button class="tab-item active" id="tab-home" onclick="switchTab('home')">
            <span class="icon">💧</span>
            <span>Главная</span>
        </button>
        <button class="tab-item" id="tab-analytics" onclick="switchTab('analytics')">
            <span class="icon">📊</span>
            <span>Аналитика</span>
        </button>
        <button class="tab-item" id="tab-goal" onclick="switchTab('goal')">
            <span class="icon">🎯</span>
            <span>Цель</span>
        </button>
    </div>

    <script>
        // Данные приложения
        let currentPureWater = 0;
        let dailyGoal = 2000;
        let todayLogs = [];
        let historyArchive = []; // Сюда сохраняются прошлые дни [{date: "...", pure: 1500, goal: 2000, percent: 75}]

        window.onload = function() {
            // Загрузка данных из локальной памяти смарта
            if(localStorage.getItem('dg_goal')) dailyGoal = parseInt(localStorage.getItem('dg_goal'));
            if(localStorage.getItem('dg_pure')) currentPureWater = parseInt(localStorage.getItem('dg_pure'));
            if(localStorage.getItem('dg_today_logs')) todayLogs = JSON.parse(localStorage.getItem('dg_today_logs'));
            if(localStorage.getItem('dg_archive')) historyArchive = JSON.parse(localStorage.getItem('dg_archive'));
            
            checkNewDay();
            updateUI();
        };

        // Проверка смены дня
        function checkNewDay() {
            const todayStr = new Date().toLocaleDateString('ru-RU', {day: 'numeric', month: 'short'});
            const savedDate = localStorage.getItem('dg_last_date');
            
            if (savedDate && savedDate !== todayStr) {
                // Если день изменился, архивируем вчерашний результат перед очисткой
                if (currentPureWater > 0 || todayLogs.length > 0) {
                    const percent = Math.round((currentPureWater / dailyGoal) * 100);
                    // Добавляем старый день в начало архива
                    historyArchive.unshift({
                        date: savedDate,
                        pure: currentPureWater,
                        goal: dailyGoal,
                        percent: percent
                    });
                    localStorage.setItem('dg_archive', JSON.stringify(historyArchive));
                }
                
                // Сбрасываем счетчики для нового дня
                currentPureWater = 0;
                todayLogs = [];
                localStorage.setItem('dg_pure', currentPureWater);
                localStorage.setItem('dg_today_logs', JSON.stringify(todayLogs));
            }
            localStorage.setItem('dg_last_date', todayStr);
        }

        function addDrink(name, totalMl, coef) {
            checkNewDay(); // Дополнительная проверка времени перед добавлением
            const pureCalculated = Math.round(totalMl * coef);
            currentPureWater += pureCalculated;
            
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            todayLogs.unshift({ name, totalMl, pureCalculated, time });
            
            saveCurrentDayData();
            updateUI();
        }

        function saveNewGoal() {
            const val = parseInt(document.getElementById('goalInput').value);
            if (val && val > 0) {
                dailyGoal = val;
                localStorage.setItem('dg_goal', dailyGoal);
                updateUI();
                alert('Цель успешно обновлена!');
                switchTab('home');
            }
        }

        function saveCurrentDayData() {
            localStorage.setItem('dg_pure', currentPureWater);
            localStorage.setItem('dg_today_logs', JSON.stringify(todayLogs));
        }

        function confirmReset() {
            if(confirm("Сбросить все выпитое за сегодня?")) {
                currentPureWater = 0;
                todayLogs = [];
                saveCurrentDayData();
                updateUI();
                switchTab('home');
            }
        }

        function updateUI() {
            // Главная страница
            document.getElementById('homeGoalDisplay').innerText = dailyGoal;
            document.getElementById('totalDisplay').innerHTML = `${currentPureWater} <span>/ ${dailyGoal} мл</span>`;
            document.getElementById('goalInput').value = dailyGoal;
            
            let progressPercent = (currentPureWater / dailyGoal) * 100;
            document.getElementById('progressBar').style.width = `${Math.min(progressPercent, 100)}%`;
            
            // Лента за сегодня
            const todayList = document.getElementById('todayLogList');
            todayList.innerHTML = todayLogs.length === 0 ? '<li style="text-align:center;color:#64748b;font-size:13px;padding:10px 0;">Вы пока ничего не пили</li>' : '';
            todayLogs.forEach(item => {
                const li = document.createElement('li');
                li.className = 'list-item';
                li.innerHTML = `
                    <div>
                        <span style="font-weight:600;font-size:14px;">${item.name}</span> <span style="font-size:12px;color:#64748b;">${item.totalMl}мл</span>
                        <div style="font-size:11px;color:var(--accent-blue);">+${item.pureCalculated} мл чистой воды</div>
                    </div>
                    <span style="color: #64748b; font-size:12px;">${item.time}</span>
                `;
                todayList.appendChild(li);
            });

            // Экран Аналитики
            const analyticsList = document.getElementById('analyticsList');
            analyticsList.innerHTML = historyArchive.length === 0 ? '<li style="text-align:center;color:#64748b;font-size:13px;padding:10px 0;">Нет данных за прошлые дни</li>' : '';
            historyArchive.forEach(day => {
                const li = document.createElement('li');
                li.className = 'list-item';
                // Подсветим зеленым, если цель выполнена на 100%+
                const color = day.percent >= 100 ? 'var(--accent-green)' : 'var(--accent-blue)';
                li.innerHTML = `
                    <div>
                        <span style="font-weight:600;font-size:14px;">${day.date}</span>
                        <div style="font-size:12px;color:#64748b;">Выпито: ${day.pure} из ${day.goal} мл</div>
                    </div>
                    <span style="font-weight:700; font-size:16px; color: ${color};">${day.percent}%</span>
                `;
                analyticsList.appendChild(li);
            });
        }

        // Переключение вкладок
        function switchTab(tabName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            
            document.getElementById(`screen-${tabName}`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            // Если зашли в аналитику, проверяем дату на случай, если приложение не закрывалось ночью
            if(tabName === 'analytics' || tabName === 'home') {
                checkNewDay();
                updateUI();
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW err', err));
        }
    </script>
</body>
</html>
