<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>H2O Tracker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Подключаем манифест с обновленной версией для сброса кэша -->
    <link rel="manifest" href="manifest.json?v=5">
    
    <!-- Иконки для iOS (экран Домой и Safari) с точным расширением капсом -->
    <link rel="apple-touch-icon" href="icon.PNG?v=5">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.PNG?v=5">
    <link rel="icon" type="image/png" sizes="32x32" href="icon.PNG?v=5">

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-brown: #fb923c;
            --tab-inactive: #64748b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(90px + env(safe-area-inset-bottom)) 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { font-size: 26px; margin: 10px 0 20px 0; font-weight: 700; width: 100%; max-width: 400px; }
        
        .screen { display: none; width: 100%; max-width: 400px; flex-direction: column; }
        .screen.active { display: flex; }

        .goal-container { background: var(--card-bg); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 15px; width: 100%; position: relative; }
        .counter { font-size: 44px; font-weight: 800; color: var(--accent-blue); margin: 5px 0; }
        .counter span { font-size: 18px; color: #64748b; font-weight: 400; }
        .progress-bar-bg { width: 100%; height: 12px; background: #0f172a; border-radius: 6px; overflow: hidden; margin-top: 15px; }
        .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #0284c7, var(--accent-blue)); transition: width 0.3s ease-out; }
        
        .undo-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.07); border: none; color: #64748b;
            border-radius: 50%; width: 32px; height: 32px; font-size: 14px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .undo-btn:active { background: rgba(255,255,255,0.15); color: var(--accent-blue); }

        .section-title { font-size: 11px; text-transform: uppercase; color: #64748b; letter-spacing: 1px; margin: 15px 0 8px 5px; font-weight: 600; align-self: flex-start; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        
        .btn {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.03);
            border-radius: 16px; padding: 14px 5px; color: white; font-size: 13px;
            font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .btn-water { border-bottom: 3px solid var(--accent-blue); }
        .btn-coffee { border-bottom: 3px solid var(--accent-brown); }
        .btn-tea { border-bottom: 3px solid var(--accent-green); }
        
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: #111726;
            border-top: 1px solid rgba(255,255,255,0.05); display: flex;
            justify-content: space-around; padding-top: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 100;
        }
        .tab-item {
            background: none; border: none; color: var(--tab-inactive);
            font-size: 11px; font-weight: 500; display: flex;
            flex-direction: column; align-items: center; gap: 4px; width: 33%;
        }
        .tab-item.active { color: var(--accent-blue); }

        .card-list { background: var(--card-bg); border-radius: 20px; padding: 15px; list-style: none; margin: 0; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .list-item:last-child { border: none; }
        
        .input-group { display: flex; gap: 10px; width: 100%; }
        .input-number {
            flex: 1; background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 15px; color: white; font-size: 18px; text-align: center; outline: none;
        }
        .save-btn { background: var(--accent-blue); color: #0b0f19; border: none; border-radius: 14px; padding: 0 25px; font-weight: 700; }
        .reset-day-btn {
            background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 14px; padding: 12px; font-size: 13px; font-weight: 600; width: 100%; margin-top: 20px;
        }
        
        #debug-log { 
            width: 100%; max-width: 400px; background: #450a0a; color: #fca5a5; 
            font-family: monospace; font-size: 11px; padding: 10px; border-radius: 10px; 
            margin-top: 15px; display: none; word-break: break-all;
        }
    </style>
</head>
<body>

    <div id="debug-log"></div>

    <!-- ЭКРАН 1: ГЛАВНАЯ -->
    <div id="screen-home" class="screen active">
        <h1>Сегодня</h1>
        <div class="goal-container">
            <button class="undo-btn" id="undoButton" title="Отменить последнее действие">↩</button>
            <div class="counter" id="totalDisplay">0 <span>/ 2000 мл</span></div>
            <div style="font-size: 12px; color: #64748b; margin-top: -2px;">чистая вода для организма</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
        </div>

        <div class="section-title">Чистая вода (100%)</div>
        <div class="grid">
            <button class="btn btn-water" data-drink="Вода" data-ml="200" data-coef="1.0">💧 Вода <span>200 мл</span></button>
            <button class="btn btn-water" data-drink="Вода" data-ml="250" data-coef="1.0">💧 Вода <span>250 мл</span></button>
            <button class="btn btn-water" data-drink="Вода" data-ml="300" data-coef="1.0">💧 Вода <span>300 мл</span></button>
        </div>

        <div class="section-title">Кофе (50-60%)</div>
        <div class="grid">
            <button class="btn btn-coffee" data-drink="Эспрессо" data-ml="50" data-coef="0.5">☕ Эспрессо <span>50 мл</span></button>
            <button class="btn btn-coffee" data-drink="Капучино м." data-ml="250" data-coef="0.6">🥛 Капуч. М <span>250 мл</span></button>
            <button class="btn btn-coffee" data-drink="Капучино б." data-ml="350" data-coef="0.6">🥤 Капуч. Б <span>350 мл</span></button>
        </div>

        <div class="section-title">Чай (75-85%)</div>
        <div class="grid">
            <button class="btn btn-tea" data-drink="Чай б/сах." data-ml="350" data-coef="0.85">🍃 Без сах. <span>350 мл</span></button>
            <button class="btn btn-tea" data-drink="Чай с сах." data-ml="350" data-coef="0.75">🍬 С сахаром <span>350 мл</span></button>
        </div>
        
        <div class="section-title" style="margin-top: 25px;">Лента за сегодня</div>
        <ul class="card-list" id="todayLogList"></ul>
    </div>

    <!-- ЭКРАН 2: АНАЛИТИКА -->
    <div id="screen-analytics" class="screen">
        <h1>Аналитика</h1>
        <div class="section-title">История по дням</div>
        <ul class="card-list" id="analyticsList"></ul>
    </div>

    <!-- ЭКРАН 3: ЦЕЛЬ -->
    <div id="screen-goal" class="screen">
        <h1>Настройки цели</h1>
        <div class="section-title">Дневная норма воды (мл)</div>
        <div class="input-group">
            <input type="number" id="goalInput" class="input-number" value="2000" pattern="[0-9]*" inputmode="numeric">
            <button class="save-btn" id="saveGoalBtn">ОК</button>
        </div>
        <button class="reset-day-btn" id="resetDayBtn">Сбросить текущий день</button>
    </div>

    <!-- ТАББАР -->
    <div class="tab-bar">
        <button class="tab-item active" id="tab-home"><span>💧</span><br>Главная</button>
        <button class="tab-item" id="tab-analytics"><span>📊</span><br>Аналитика</button>
        <button class="tab-item" id="tab-goal"><span>🎯</span><br>Цель</button>
    </div>

    <script>
        // Исправленный логгер ошибок (игнорирует внутренний CORS шум Safari)
        window.onerror = function(msg, url, line) {
            if (msg === "Script error." && line === 0) return true;
            const el = document.getElementById('debug-log');
            if(el) { el.style.display = 'block'; el.innerHTML += 'Err: ' + msg + ' (L:' + line + ')<br>'; }
            return false;
        };

        let currentPureWater = 0;
        let dailyGoal = 2000;
        let todayLogs = [];
        let historyArchive = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            checkNewDay();
            updateUI();

            document.querySelectorAll('.grid .btn').forEach(button => {
                button.addEventListener('click', function() {
                    const name = this.getAttribute('data-drink');
                    const ml = parseInt(this.getAttribute('data-ml'));
                    const coef = parseFloat(this.getAttribute('data-coef'));
                    addDrink(name, ml, coef);
                });
            });

            document.getElementById('undoButton').addEventListener('click', undoLastAction);
            document.getElementById('tab-home').addEventListener('click', () => switchTab('home'));
            document.getElementById('tab-analytics').addEventListener('click', () => switchTab('analytics'));
            document.getElementById('tab-goal').addEventListener('click', () => switchTab('goal'));
            document.getElementById('saveGoalBtn').addEventListener('click', saveNewGoal);
            document.getElementById('resetDayBtn').addEventListener('click', confirmReset);
        });

        function loadData() {
            try {
                if(localStorage.getItem('dg_goal')) dailyGoal = parseInt(localStorage.getItem('dg_goal'));
                if(localStorage.getItem('dg_pure')) currentPureWater = parseInt(localStorage.getItem('dg_pure'));
                if(localStorage.getItem('dg_today_logs')) todayLogs = JSON.parse(localStorage.getItem('dg_today_logs'));
                if(localStorage.getItem('dg_archive')) historyArchive = JSON.parse(localStorage.getItem('dg_archive'));
            } catch(e) { console.error(e); }
        }

        function checkNewDay() {
            const todayStr = new Date().toLocaleDateString('ru-RU', {day: 'numeric', month: 'short'});
            const savedDate = localStorage.getItem('dg_last_date');
            
            if (savedDate && savedDate !== todayStr) {
                if (currentPureWater > 0 || todayLogs.length > 0) {
                    const percent = Math.round((currentPureWater / dailyGoal) * 100);
                    historyArchive.unshift({ date: savedDate, pure: currentPureWater, goal: dailyGoal, percent: percent });
                    localStorage.setItem('dg_archive', JSON.stringify(historyArchive));
                }
                currentPureWater = 0;
                todayLogs = [];
                saveState();
            }
            localStorage.setItem('dg_last_date', todayStr);
        }

        function addDrink(name, totalMl, coef) {
            checkNewDay();
            const pureCalculated = Math.round(totalMl * coef);
            currentPureWater += pureCalculated;
            
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            todayLogs.unshift({ name, totalMl, pureCalculated, time });
            
            saveState();
            updateUI();
        }

        function undoLastAction() {
            if (todayLogs.length === 0) {
                alert("Удалять пока нечего!");
                return;
            }
            const removedItem = todayLogs.shift();
            currentPureWater = Math.max(0, currentPureWater - removedItem.pureCalculated);
            
            saveState();
            updateUI();
        }

        function saveState() {
            localStorage.setItem('dg_pure', currentPureWater);
            localStorage.setItem('dg_today_logs', JSON.stringify(todayLogs));
        }

        function saveNewGoal() {
            const val = parseInt(document.getElementById('goalInput').value);
            if (val && val > 0) {
                dailyGoal = val;
                localStorage.setItem('dg_goal', dailyGoal);
                updateUI();
                switchTab('home');
            }
        }

        function confirmReset() {
            if(confirm("Сбросить все выпитое за сегодня?")) {
                currentPureWater = 0;
                todayLogs = [];
                saveState();
                updateUI();
                switchTab('home');
            }
        }

        function updateUI() {
            document.getElementById('totalDisplay').innerHTML = currentPureWater + " <span>/ " + dailyGoal + " мл</span>";
            document.getElementById('goalInput').value = dailyGoal;
            
            let progressPercent = (currentPureWater / dailyGoal) * 100;
            document.getElementById('progressBar').style.width = Math.min(progressPercent, 100) + "%";
            
            const todayList = document.getElementById('todayLogList');
            if(todayList) {
                todayList.innerHTML = todayLogs.length === 0 ? '<li style="text-align:center;color:#64748b;font-size:13px;padding:15px 0;">Вы пока ничего не пили</li>' : '';
                todayLogs.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'list-item';
                    li.innerHTML = "<div><span style='font-weight:600;font-size:14px;'>" + item.name + "</span> <span style='font-size:12px;color:#64748b;'>" + item.totalMl + "мл</span><div style='font-size:11px;color:var(--accent-blue);'>+" + item.pureCalculated + " мл воды</div></div><span style='color:#64748b;font-size:12px;'>" + item.time + "</span>";
                    todayList.appendChild(li);
                });
            }

            const analyticsList = document.getElementById('analyticsList');
            if(analyticsList) {
                analyticsList.innerHTML = historyArchive.length === 0 ? '<li style="text-align:center;color:#64748b;font-size:13px;padding:15px 0;">Нет данных</li>' : '';
                historyArchive.forEach(day => {
                    const li = document.createElement('li');
                    li.className = 'list-item';
                    const color = day.percent >= 100 ? 'var(--accent-green)' : 'var(--accent-blue)';
                    li.innerHTML = "<div><span style='font-weight:600;font-size:14px;'>" + day.date + "</span><div style='font-size:12px;color:#64748b;'>Выпито: " + day.pure + " из " + day.goal + " мл</div></div><span style='font-weight:700;font-size:16px;color:" + color + ";'>" + day.percent + "%</span>";
                    analyticsList.appendChild(li);
                });
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            
            document.getElementById('screen-' + tabName).classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
            
            if(tabName === 'analytics' || tabName === 'home') {
                checkNewDay();
                updateUI();
            }
        }
    </script>
</body>
</html>
